  </g>
  <g id="monitor">
    <rect x="100" y="1340" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="180" y="1375" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Monitoring</text>
  </g>
</svg>
