  </g>
  <polyline points="220,160 300,160" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="460,160 540,160" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="460,160 540,320" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="700,160 780,320" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="700,320 780,320" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="700,160 780,160" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="700,320 780,160" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <g id="client">
    <rect x="60" y="130" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="140" y="165" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Client</text>
  </g>
  <g id="lb">
    <rect x="300" y="130" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="380" y="165" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Load Balancer</text>
  </g>
  <g id="api1">
    <rect x="540" y="130" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="620" y="165" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">API Server 1</text>
  </g>
  <g id="api2">
