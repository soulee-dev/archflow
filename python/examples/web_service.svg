<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 450" width="1040" height="450">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667085"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <g id="vpc">
    <rect x="260" y="60" width="240" height="170" rx="12" fill="#F5F7FA" stroke="#D0D5DD" stroke-width="1.5"/>
    <text x="276" y="80" font-size="12" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#475467" text-anchor="start" dominant-baseline="middle">AWS VPC</text>
  </g>
  <g id="app_tier">
    <rect x="500" y="60" width="240" height="330" rx="12" fill="#F5F7FA" stroke="#D0D5DD" stroke-width="1.5"/>
    <text x="516" y="80" font-size="12" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#475467" text-anchor="start" dominant-baseline="middle">Application Tier</text>
  </g>
  <g id="data_tier">
    <rect x="740" y="60" width="240" height="330" rx="12" fill="#F5F7FA" stroke="#D0D5DD" stroke-width="1.5"/>
