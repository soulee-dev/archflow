<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667085"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <g id="vpc">
    <rect x="20" y="-10" width="720" height="170" rx="12" fill="#F5F7FA" stroke="#D0D5DD" stroke-width="1.5"/>
    <text x="36" y="10" font-size="12" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#475467" text-anchor="start" dominant-baseline="middle">VPC</text>
  </g>
  <polyline points="220,90 300,90" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <polyline points="460,90 540,90" fill="none" stroke="#667085" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <g id="web">
    <rect x="60" y="60" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="140" y="95" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Web Server</text>
  </g>
  <g id="app">
    <rect x="300" y="60" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="380" y="95" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">App Server</text>
  </g>
  <g id="db">
    <rect x="540" y="60" width="160" height="60" rx="8" fill="#4A90D9" stroke="#2C5F8A" stroke-width="1.5"/>
    <text x="620" y="95" font-size="14" font-family="Inter, system-ui, -apple-system, sans-serif" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Database</text>
  </g>
</svg>
